name: IPL Live Score Sync

on:
  schedule:
    - cron: '*/5 * * 3-5 *'
  workflow_dispatch:

env:
  # This tells GitHub to use the newer Node.js 24 engine now
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v5 (Supports Node 24)
      - name: Checkout code
        uses: actions/checkout@v5

      # Updated to v6 (Supports Node 24)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 gspread oauth2client

      - name: Run Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scraper.py
